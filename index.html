<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>러브레터</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: "Georgia", "Malgun Gothic", serif;
    background: #000;
  }

  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
  }

  .white-expand {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #fff;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center;
    cursor: pointer;
    z-index: 5;
    box-shadow: 0 0 20px rgba(255,255,255,0.35);
    transition: transform 1.3s ease-in-out, box-shadow 0.3s ease;
  }

  .white-expand:hover {
    box-shadow: 0 0 32px rgba(255,255,255,0.55);
  }

  .screen.reveal {
    background: #fff;
    transition: background 1.1s ease 0.15s;
  }

  .screen.reveal .white-expand {
    transform: translate(-50%, -50%) scale(60);
    box-shadow: 0 0 140px rgba(255,255,255,0.95);
  }

  .letter-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.9s ease;
    z-index: 10;
  }

  .screen.show-letter .letter-wrap {
    opacity: 1;
    pointer-events: auto;
  }

  .letter-paper {
    width: min(680px, 84vw);
    min-height: min(460px, 72vh);
    background: linear-gradient(180deg, #fffef9 0%, #fffaf1 100%);
    border: 1px solid rgba(170, 150, 120, 0.25);
    border-radius: 10px;
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.14);
    padding: 56px 54px;
    color: #2f2a24;
    transform: translateY(40px) scale(0.96);
    transition: transform 0.9s ease;
    position: relative;
    overflow: hidden;
  }

  .screen.show-letter .letter-paper {
    transform: translateY(0) scale(1);
  }

  .letter-paper::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0 34px,
      rgba(205, 200, 190, 0.18) 34px 35px
    );
    pointer-events: none;
  }

  .letter-content {
    position: relative;
    z-index: 1;
  }

  .letter-title {
    font-size: clamp(28px, 4vw, 40px);
    margin: 0 0 36px;
    font-weight: 700;
    color: #1f1b18;
  }

  .letter-body {
    font-size: clamp(20px, 2.5vw, 28px);
    line-height: 1.9;
    margin: 0 0 32px;
    white-space: pre-line;
    min-height: 180px;
  }

  .next-btn {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    background: #1f1b18;
    color: #fffef9;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .next-btn:hover {
    transform: translateY(-2px);
  }

  .next-btn:disabled {
    opacity: 0.45;
    cursor: default;
    transform: none;
  }

  .heart-burst {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 20;
  }

  .heart {
    position: absolute;
    bottom: -40px;
    font-size: 28px;
    opacity: 0;
    animation: float-heart 2.8s ease-in forwards;
  }

  @keyframes float-heart {
    0% {
      transform: translateY(0) scale(0.8) rotate(0deg);
      opacity: 0;
    }
    15% {
      opacity: 1;
    }
    100% {
      transform: translateY(-110vh) scale(1.25) rotate(18deg);
      opacity: 0;
    }
  }

  .guide {
    position: absolute;
    left: 50%;
    bottom: 36px;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.72);
    font-size: 15px;
    letter-spacing: 0.02em;
    z-index: 6;
    transition: opacity 0.4s ease;
  }

  .screen.reveal .guide {
    opacity: 0;
  }
</style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="white-expand" id="whiteExpand" aria-label="시작 원"></div>
    <div class="guide">흰색 원을 클릭해줘</div>

    <div class="letter-wrap" id="letterWrap">
      <div class="letter-paper">
        <div class="letter-content">
          <h1 class="letter-title" id="letterTitle">석현이에게</h1>
          <p class="letter-body" id="letterBody">안녕? 편지지를 안가져와서 대신 만들어왔어.</p>
          <button class="next-btn" id="nextBtn" type="button">다음으로</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const screen = document.getElementById('screen');
    const whiteExpand = document.getElementById('whiteExpand');
    const letterTitle = document.getElementById('letterTitle');
    const letterBody = document.getElementById('letterBody');
    const nextBtn = document.getElementById('nextBtn');

    const heartBurst = document.createElement('div');
    heartBurst.className = 'heart-burst';
    heartBurst.id = 'heartBurst';
    document.getElementById('screen').appendChild(heartBurst);

    const pages = [
      {
        title: '석현이에게',
        body: '안녕? 편지지를 안가져와서 대신 만들어왔어.'
      },
      {
        title: '',
        body: `우리 오늘 1주년이다
소감이 어때 ?`
      },
      {
        title: '',
        body: '나는 우리가 본지 두번만에 사귀었는데, 이렇게 오래 잘 만나고 있는게 신기해'
      },
      {
        title: '',
        body: '2주년에는 더 신기하겠지?'
      },
      {
        title: '',
        body: '앞으로도 잘 만나쟈'
      },
      {
        title: '',
        body: '사랑해'
      },
      {
        title: '',
        body: '안뇽'
      },
      {
        title: '',
        body: '뿅'
      },
      {
        title: '',
        body: `이쁘고 귀엽고 사랑스러운 지호가
2026-03-16`
      }
    ];

    let started = false;
    let currentPage = 0;

    function renderPage() {
      const page = pages[currentPage];
      letterTitle.textContent = page.title;
      letterBody.textContent = page.body;
      nextBtn.disabled = currentPage >= pages.length - 1;
      nextBtn.textContent = currentPage >= pages.length - 1 ? '끝' : '다음으로';
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = Math.random() > 0.5 ? '❤' : '💗';
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.animationDuration = `${2.2 + Math.random() * 1.8}s`;
      heart.style.fontSize = `${22 + Math.random() * 20}px`;
      heartBurst.appendChild(heart);
      setTimeout(() => heart.remove(), 4000);
    }

    function launchHeartEnding() {
      for (let i = 0; i < 18; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    whiteExpand.addEventListener('click', () => {
      if (started) return;
      started = true;

      screen.classList.add('reveal');

      setTimeout(() => {
        screen.classList.add('show-letter');
        renderPage();
      }, 1100);
    });

    nextBtn.addEventListener('click', () => {
      if (currentPage < pages.length - 1) {
        currentPage += 1;
        renderPage();

        if (currentPage === pages.length - 1) {
          launchHeartEnding();
        }
      }
    });
  </script>
</body>
</html>
